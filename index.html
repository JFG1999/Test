<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Web-Artefakt</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-glow: linear-gradient(135deg, #ff007f 0%, #7928ca 100%);
            --secondary-glow: linear-gradient(135deg, #00dfd8 0%, #007cf0 100%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ambient Glow Background */
        .glow-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(121, 40, 202, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -10%;
            left: -10%;
            z-index: 1;
            filter: blur(80px);
            animation: float 10s ease-in-out infinite alternate;
        }

        .glow-bg-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 223, 216, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: 1;
            filter: blur(80px);
            animation: float 12s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 10;
            position: relative;
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: var(--primary-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Interactive Element */
        .btn {
            background: var(--secondary-glow);
            border: none;
            color: white;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 223, 216, 0.3);
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0, 223, 216, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .counter {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="glow-bg-2"></div>

    <div class="card">
        <h1>Hello World!</h1>
        <p>Dies ist ein interaktives Web-Artefakt, erstellt von Antigravity. Es nutzt modernes Glassmorphism-Design und CSS-Glow-Effekte.</p>
        <button class="btn" onclick="celebrate()">Klick mich!</button>
        <div class="counter" id="click-count">Klicks: 0</div>
    </div>

    <script>
        let count = 0;
        function celebrate() {
            count++;
            document.getElementById('click-count').innerText = `Klicks: ${count}`;
            
            // Create mini particles
            for(let i=0; i<10; i++) {
                createParticle();
            }
        }

        function createParticle() {
            const p = document.createElement('div');
            p.style.position = 'absolute';
            p.style.width = '8px';
            p.style.height = '8px';
            p.style.background = Math.random() > 0.5 ? 'cyan' : 'magenta';
            p.style.borderRadius = '50%';
            p.style.zIndex = '100';
            
            const card = document.querySelector('.card');
            card.appendChild(p);
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 2 + Math.random() * 5;
            let x = card.clientWidth / 2;
            let y = card.clientHeight / 2 + 50;
            let opacity = 1;
            
            const timer = setInterval(() => {
                x += Math.cos(angle) * velocity;
                y += Math.sin(angle) * velocity;
                opacity -= 0.05;
                
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.opacity = opacity;
                
                if(opacity <= 0) {
                    clearInterval(timer);
                    p.remove();
                }
            }, 16);
        }
    </script>
</body>
</html>
